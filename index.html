<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Premium Movie Blog</title>

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:
    radial-gradient(circle at top,#1b1b1b 0%,#0f0f0f 40%),
    #0f0f0f;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:14px;
  overflow-x:hidden;
}

/* =========================
   TITLE
========================= */

h1{
  text-align:center;
  font-size:34px;
  font-weight:800;
  margin-bottom:28px;
  letter-spacing:.5px;
  background:linear-gradient(
    90deg,
    #ffffff,
    #cfcfcf
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:18px;
}

@media(max-width:1300px){
  .grid{
    grid-template-columns:repeat(5,1fr);
  }
}

@media(max-width:1050px){
  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:768px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
}

@media(max-width:480px){
  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
}

/* =========================
   CARD
========================= */

.card{
  position:relative;
  overflow:hidden;
  border-radius:24px;
  background:
    linear-gradient(
      180deg,
      rgba(28,28,28,.96),
      rgba(16,16,16,.98)
    );
  border:1px solid rgba(255,255,255,.06);
  transition:.4s ease;
  cursor:pointer;
  isolation:isolate;
  box-shadow:
    0 8px 25px rgba(0,0,0,.35);
}

/* animated glow border */

.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:26px;
  background:
    linear-gradient(
      135deg,
      rgba(255,0,102,.35),
      rgba(0,195,255,.25),
      rgba(140,255,0,.18),
      rgba(255,166,0,.25)
    );
  background-size:300% 300%;
  animation:borderMove 7s linear infinite;
  z-index:-2;
  opacity:0;
  transition:.4s ease;
}

.card:hover::before{
  opacity:1;
}

@keyframes borderMove{
  0%{
    background-position:0% 50%;
  }
  100%{
    background-position:300% 50%;
  }
}

/* hover */

.card:hover{
  transform:
    translateY(-8px)
    scale(1.02);

  box-shadow:
    0 20px 40px rgba(0,0,0,.55),
    0 0 20px rgba(255,0,102,.15);
}

/* =========================
   IMAGE
========================= */

.poster-wrap{
  position:relative;
  width:100%;
  aspect-ratio:2/3;
  overflow:hidden;
  background:#1b1b1b;
}

/* image */

.poster{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:
    transform .7s ease,
    filter .4s ease;
}

.card:hover .poster{
  transform:scale(1.1);
  filter:brightness(1.08);
}

/* image dark overlay */

.poster-wrap::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:45%;
  background:
    linear-gradient(
      to top,
      rgba(0,0,0,.92),
      transparent
    );
}

/* =========================
   CONTENT
========================= */

.content{
  position:relative;
  padding:12px;
}

/* =========================
   TITLE
========================= */

.title{
  font-size:14px;
  font-weight:700;
  line-height:1.4;
  margin-bottom:8px;
  transition:.3s ease;
  min-height:40px;
}

/* dynamic colorful titles */

.card:nth-child(6n+1) .title{
  color:#ffb86c;
}

.card:nth-child(6n+2) .title{
  color:#d8b4ff;
}

.card:nth-child(6n+3) .title{
  color:#7edbff;
}

.card:nth-child(6n+4) .title{
  color:#7ef0b8;
}

.card:nth-child(6n+5) .title{
  color:#ffd56a;
}

.card:nth-child(6n+6) .title{
  color:#ff9f9f;
}

.card:hover .title{
  transform:translateX(4px);
}

/* =========================
   META
========================= */

.meta{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
  font-size:11px;
  color:#9d9d9d;
}

/* dot */

.meta::before{
  content:"";
  width:6px;
  height:6px;
  border-radius:50%;
  background:#ff004c;
  box-shadow:0 0 10px #ff004c;
}

/* =========================
   LABELS
========================= */

.labels{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.label{
  background:
    rgba(255,255,255,.06);
  border:
    1px solid rgba(255,255,255,.06);

  color:#ddd;
  font-size:10px;
  padding:5px 9px;
  border-radius:30px;

  backdrop-filter:blur(8px);

  transition:.3s ease;
}

.label:hover{
  background:
    rgba(255,255,255,.12);
}

/* =========================
   DESC
========================= */

.desc{
  font-size:12px;
  color:#bdbdbd;
  line-height:1.55;
}

/* =========================
   PAGINATION
========================= */

.pagination{
  margin-top:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}

button{
  border:none;
  outline:none;

  background:
    linear-gradient(
      135deg,
      #ff004c,
      #ff5e00
    );

  color:#fff;

  padding:12px 20px;

  border-radius:14px;

  font-size:14px;
  font-weight:700;

  cursor:pointer;

  transition:.3s ease;

  box-shadow:
    0 10px 20px rgba(255,0,76,.2);
}

button:hover{
  transform:
    translateY(-3px)
    scale(1.03);

  box-shadow:
    0 14px 30px rgba(255,0,76,.35);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

#pageNum{
  font-weight:700;
  color:#ddd;
  font-size:16px;
}

/* =========================
   LOADING
========================= */

.loading{
  grid-column:1/-1;
  text-align:center;
  padding:80px 20px;
  font-size:18px;
  color:#ddd;
}

/* =========================
   DETAIL VIEW
========================= */

#detailView{
  display:none;
  max-width:1000px;
  margin:auto;

  background:
    linear-gradient(
      180deg,
      #1c1c1c,
      #131313
    );

  border:
    1px solid rgba(255,255,255,.06);

  border-radius:24px;

  padding:22px;

  box-shadow:
    0 15px 40px rgba(0,0,0,.45);
}

/* =========================
   BACK BUTTON
========================= */

.backBtn{
  margin-bottom:20px;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#111;
}

::-webkit-scrollbar-thumb{
  background:#333;
  border-radius:30px;
}

</style>
</head>

<body>

<h1>Latest Movies</h1>

<div id="posts" class="grid"></div>

<div id="detailView">

  <button
    class="backBtn"
    onclick="goBack()">
    ⬅ Back
  </button>

  <div id="detailContent"></div>

</div>

<div class="pagination">

  <button id="prevBtn">
    Prev
  </button>

  <span id="pageNum">1</span>

  <button id="nextBtn">
    Next
  </button>

</div>

<script>

/* =========================
   API
========================= */

const API =
"https://jiorockers-api.salim1monira.workers.dev";

/* =========================
   SETTINGS
========================= */

const POSTS_PER_PAGE = 24;

let currentPage = 1;
let allPosts = [];

/* =========================
   ELEMENTS
========================= */

const postsEl =
document.getElementById("posts");

const pageNumEl =
document.getElementById("pageNum");

const prevBtn =
document.getElementById("prevBtn");

const nextBtn =
document.getElementById("nextBtn");

const detailView =
document.getElementById("detailView");

const detailContent =
document.getElementById("detailContent");

/* =========================
   SLUG
========================= */

function slugify(text){

  return text
    .toString()
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/(^-|-$)/g,'');
}

/* =========================
   IMAGE
========================= */

function getImage(post){

  return (

    post.media$thumbnail?.url
      ?.replace("/s72-c/","/s1200/")

    ||

    post.content?.$t
      .match(/<img.*?src="(.*?)"/i)?.[1]

    ||

    "https://via.placeholder.com/500x750?text=No+Image"

  );
}

/* =========================
   SUMMARY
========================= */

function getSummary(html){

  if(!html) return "";

  const div =
    document.createElement("div");

  div.innerHTML = html;

  return div.innerText
    .replace(/\s+/g," ")
    .trim()
    .substring(0,70) + "...";
}

/* =========================
   LABELS
========================= */

function getLabels(post){

  return post.category
    ?.map(c => c.term) || [];
}

/* =========================
   CARD
========================= */

function createCard(post){

  const image =
    getImage(post);

  const title =
    post.title?.$t || "No Title";

  const summary =
    getSummary(post.content?.$t);

  const labels =
    getLabels(post);

  const date =
    new Date(post.published?.$t)
    .toLocaleDateString();

  const slug =
    slugify(title);

  return `

    <div
      class="card"
      onclick="openPost('${slug}')"
    >

      <div class="poster-wrap">

        <img
          class="poster"
          src="${image}"
          loading="lazy"
          alt="${title}"
        >

      </div>

      <div class="content">

        <div class="title">
          ${title}
        </div>

        <div class="meta">
          ${date}
        </div>

        <div class="labels">

          ${labels.slice(0,2).map(label =>

            `<span class="label">
              ${label}
            </span>`

          ).join("")}

        </div>

        <div class="desc">
          ${summary}
        </div>

      </div>

    </div>
  `;
}

/* =========================
   OPEN POST
========================= */

function openPost(slug){

  const post =
    allPosts.find(p =>

      slugify(
        p.title?.$t || ""
      ) === slug
    );

  if(!post){

    postsEl.style.display =
      "none";

    detailView.style.display =
      "block";

    detailContent.innerHTML =
      "<h2>Post not found</h2>";

    return;
  }

  const title =
    post.title?.$t || "No Title";

  const content =
    post.content?.$t || "";

  postsEl.style.display =
    "none";

  detailView.style.display =
    "block";

  detailContent.innerHTML = `

    <h2 style="
      margin-bottom:20px;
      font-size:32px;
      line-height:1.5;
    ">
      ${title}
    </h2>

    <div>
      ${content}
    </div>
  `;

  history.pushState(
    {slug},
    "",
    "?post=" + slug
  );
}

/* =========================
   BACK
========================= */

function goBack(){

  postsEl.style.display =
    "grid";

  detailView.style.display =
    "none";

  history.pushState(
    {},
    "",
    window.location.pathname
  );
}

/* =========================
   URL CHECK
========================= */

function checkURL(){

  const params =
    new URLSearchParams(
      window.location.search
    );

  const slug =
    params.get("post");

  if(slug && allPosts.length){

    openPost(slug);
  }
}

/* =========================
   LOAD POSTS
========================= */

async function loadPosts(page){

  postsEl.innerHTML = `

    <div class="loading">
      Loading Premium Movies...
    </div>

  `;

  try{

    const res =
      await fetch(

        API +

        "?page=" + page +

        "&limit=" + POSTS_PER_PAGE
      );

    const data =
      await res.json();

    allPosts =
      data.posts || [];

    postsEl.innerHTML =

      allPosts
      .slice(0,24)
      .map(post =>
        createCard(post)
      )
      .join("");

    pageNumEl.innerText =
      page;

    prevBtn.disabled =
      page <= 1;

    checkURL();

    window.scrollTo({
      top:0,
      behavior:"smooth"
    });

  }catch(e){

    postsEl.innerHTML = `

      <div class="loading">
        Failed to load posts
      </div>

    `;
  }
}

/* =========================
   NEXT
========================= */

nextBtn.onclick = () => {

  currentPage++;

  loadPosts(currentPage);
};

/* =========================
   PREV
========================= */

prevBtn.onclick = () => {

  if(currentPage > 1){

    currentPage--;

    loadPosts(currentPage);
  }
};

/* =========================
   POPSTATE
========================= */

window.onpopstate = () => {

  if(location.search.includes("post=")){

    const slug =

      new URLSearchParams(
        location.search
      ).get("post");

    openPost(slug);

  }else{

    goBack();
  }
};

/* =========================
   INIT
========================= */

loadPosts(currentPage);

</script>

</body>
</html>
