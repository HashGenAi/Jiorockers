<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Premium Movie Blog</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

/* =========================
   HEADER
========================= */

.topbar{
  position:sticky;
  top:0;
  z-index:9999;
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  background:rgba(10,10,10,.88);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.08);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:#fff;
  min-width:0;
}

.brand-logo{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff004c,#ff7b00);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  flex-shrink:0;
}

.brand-text{
  min-width:0;
}

.brand-text h1{
  font-size:18px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.brand-text p{
  font-size:12px;
  color:#aaa;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.topbar-center{
  min-width:0;
}

.search-wrap{
  width:100%;
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:10px 12px;
}

.search-icon{
  width:18px;
  height:18px;
  flex-shrink:0;
}

.search-input{
  width:100%;
  min-width:0;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:14px;
}

.search-input::placeholder{
  color:#aaa;
}

.search-clear{
  width:30px;
  height:30px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
  display:none;
}

.search-clear.show{
  display:block;
}

.topbar-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-btn{
  width:46px;
  height:46px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.menu-lines{
  width:20px;
  height:14px;
  position:relative;
}

.menu-lines span{
  position:absolute;
  width:100%;
  height:2px;
  background:#fff;
  left:0;
  border-radius:2px;
}

.menu-lines span:nth-child(1){
  top:0;
}

.menu-lines span:nth-child(2){
  top:6px;
}

.menu-lines span:nth-child(3){
  bottom:0;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
  position:fixed;
  top:0;
  left:-100%;
  width:280px;
  height:100vh;
  background:#181818;
  z-index:10000;
  transition:.3s;
  padding:20px;
}

.sidebar.active{
  left:0;
}

.sidebar-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  opacity:0;
  visibility:hidden;
  transition:.3s;
  z-index:9998;
}

.sidebar-overlay.active{
  opacity:1;
  visibility:visible;
}

.sidebar-close{
  width:40px;
  height:40px;
  border:none;
  border-radius:12px;
  background:#222;
  color:#fff;
  font-size:22px;
  cursor:pointer;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:#fff;
  text-decoration:none;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
  background:#222;
}

/* =========================
   PAGE
========================= */

.app{
  padding:16px;
}

.page-title{
  text-align:center;
  font-size:32px;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:18px;
  max-width:1400px;
  margin:auto;
}

.card{
  background:#181818;
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
}

.poster-wrap{
  width:100%;
  aspect-ratio:2/3;
  overflow:hidden;
}

.poster{
  width:100%;
  height:100%;
  object-fit:cover;
}

.content{
  padding:12px;
}

.title{
  font-size:14px;
  font-weight:700;
  line-height:1.5;
  margin-bottom:10px;
}

.labels{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.label{
  font-size:10px;
  padding:5px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
}

/* =========================
   PAGINATION
========================= */

.pagination{
  margin-top:35px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
}

.nav-btn{
  padding:12px 20px;
  border-radius:12px;
  background:#ff004c;
  color:#fff;
  text-decoration:none;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1200px){
  .grid{
    grid-template-columns:repeat(5,1fr);
  }
}

@media(max-width:992px){
  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}

@media(max-width:768px){

  .topbar{
    grid-template-columns:1fr auto;
    grid-template-areas:
      "brand actions"
      "search search";
  }

  .brand{
    grid-area:brand;
  }

  .topbar-center{
    grid-area:search;
    width:100%;
  }

  .topbar-actions{
    grid-area:actions;
  }

  .search-wrap{
    width:100%;
    margin-top:5px;
  }

  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:12px;
  }

  .page-title{
    font-size:26px;
  }
}

@media(max-width:480px){

  .topbar{
    padding:10px;
    gap:10px;
  }

  .brand-logo{
    width:40px;
    height:40px;
    font-size:18px;
  }

  .brand-text h1{
    font-size:15px;
  }

  .brand-text p{
    font-size:10px;
  }

  .menu-btn{
    width:42px;
    height:42px;
    border-radius:12px;
  }

  .search-wrap{
    padding:9px 10px;
  }

  .search-input{
    font-size:13px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
  }

  .title{
    font-size:13px;
  }

  .app{
    padding:10px;
  }
}

</style>
</head>

<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">

  <button class="sidebar-close" id="sidebarClose">×</button>

  <a href="#">Home</a>
  <a href="#">Latest Movies</a>
  <a href="#">Trending</a>
  <a href="#">Hollywood</a>
  <a href="#">Bollywood</a>

</div>

<header class="topbar">

  <a class="brand" href="#">
    <div class="brand-logo">M</div>

    <div class="brand-text">
      <h1>Premium Movie Blog</h1>
      <p>Latest movies and web series</p>
    </div>
  </a>

  <div class="topbar-center">

    <div class="search-wrap">

      <svg class="search-icon" viewBox="0 0 24 24" fill="none">
        <path d="M21 21l-4.35-4.35" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="7" stroke="white" stroke-width="2"/>
      </svg>

      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="Search movies..."
      >

      <button class="search-clear" id="searchClear">×</button>

    </div>

  </div>

  <div class="topbar-actions">

    <button class="menu-btn" id="menuBtn">

      <div class="menu-lines">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </button>

  </div>

</header>

<div class="app">

  <h1 class="page-title">Latest Movies</h1>

  <div class="grid" id="posts"></div>

  <div class="pagination">
    <a href="#" class="nav-btn">Prev</a>
    <a href="#" class="nav-btn">Next</a>
  </div>

</div>

<script>

const posts = [
  {
    title:"Avengers Endgame",
    image:"https://picsum.photos/400/600?1",
    labels:["Marvel","Action"]
  },
  {
    title:"John Wick 4",
    image:"https://picsum.photos/400/600?2",
    labels:["Action","Thriller"]
  },
  {
    title:"Fast X",
    image:"https://picsum.photos/400/600?3",
    labels:["Racing","Action"]
  },
  {
    title:"Avatar 2",
    image:"https://picsum.photos/400/600?4",
    labels:["Sci-Fi","Adventure"]
  },
  {
    title:"The Batman",
    image:"https://picsum.photos/400/600?5",
    labels:["DC","Action"]
  },
  {
    title:"Extraction 2",
    image:"https://picsum.photos/400/600?6",
    labels:["Netflix","Action"]
  }
];

const postsEl = document.getElementById("posts");
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

function createCard(post){

  return `
    <a class="card" href="#">

      <div class="poster-wrap">
        <img class="poster" src="${post.image}">
      </div>

      <div class="content">

        <div class="title">${post.title}</div>

        <div class="labels">
          ${post.labels.map(label => `
            <span class="label">${label}</span>
          `).join("")}
        </div>

      </div>

    </a>
  `;
}

function renderPosts(data){
  postsEl.innerHTML = data.map(createCard).join("");
}

renderPosts(posts);

searchInput.addEventListener("input", ()=>{

  const value = searchInput.value.toLowerCase();

  if(value){
    searchClear.classList.add("show");
  }else{
    searchClear.classList.remove("show");
  }

  const filtered = posts.filter(post =>
    post.title.toLowerCase().includes(value)
  );

  renderPosts(filtered);

});

searchClear.addEventListener("click", ()=>{

  searchInput.value="";
  searchClear.classList.remove("show");
  renderPosts(posts);

});

const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");
const sidebarClose = document.getElementById("sidebarClose");

menuBtn.addEventListener("click", ()=>{

  sidebar.classList.add("active");
  sidebarOverlay.classList.add("active");

});

sidebarClose.addEventListener("click", closeSidebar);
sidebarOverlay.addEventListener("click", closeSidebar);

function closeSidebar(){
  sidebar.classList.remove("active");
  sidebarOverlay.classList.remove("active");
}

</script>

</body>
</html>
